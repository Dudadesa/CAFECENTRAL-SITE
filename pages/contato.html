<!DOCTYPE html>
<html>
    <head>
        <title>Contato</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body>
        <!-- Cabeçalho reutilizado -->
        <header class="topo"> <!-- Cabeçalho do Site -->
            <div class="logo">
                <a href="index.html">Cafe<span>Central</span></a>
            </div>
            <nav class="menu">
                <a href="index.html" class="ativo">Início</a>
                <a href="sobre.html">Sobre</a>
                <a href="cardapio.html">cardapio</a>
                <a href="contato.html">Contato</a>
            </nav>
        </header>

        <!-- Conteúdo da página -->
        <section class="contato">
            <h2>Fale Conosco</h2>
            <!-- Início do Formulário -->
             <form>
                <!-- Campo nome -->
                 <label for="nome">Seu nome: </label>
                 <input type="text" required id="nome" placeholder="Digite seu nome">
                <br><br>
                 <!-- Campo e-mail -->
                 <label for="email">Seu e-mail: </label>
                 <input type="email" required id="email" placeholder="Digite seu e-mail">
                <br><br> <!-- Quebra de linha - pula -->
                 <!-- Campo mensagem -->
                 <label for="mensagem">Mensagem </label>
                 <textarea rows="5" required id="mensagem"></textarea>
                <br><br>
                 <button type="submit">Enviar</button>
            </form>
        </section>

        <!-- Rodapé reutilizado -->
        <footer class="rodape">
            <p>® 2026 CafeCentral. Todos os Direitos Reservados</p>
            <p><a href="contato.html">Entre em Contato</a></p>
        </footer>


    <script src="js/script.js"></script>
    </body>
</html>
